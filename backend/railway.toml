# Railway config when this folder is the service root ("Root Directory" = backend).
# See RAILWAY_DEPLOY.md for full step-by-step deployment.

[build]
builder = "NIXPACKS"

[deploy]
# Pre-deploy: Run migrations before start
preDeployCommand = "npx prisma migrate deploy"
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
