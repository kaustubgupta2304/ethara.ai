# Railway config when this folder is the service root ("Root Directory" = backend).
# See RAILWAY_DEPLOY.md for full step-by-step deployment.

[build]
builder = "nixpacks"

[deploy]
startCommand = "npx prisma migrate deploy && npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
